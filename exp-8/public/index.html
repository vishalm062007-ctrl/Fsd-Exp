<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --danger: #EF4444;
            --danger-hover: #DC2626;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button.btn-danger {
            background-color: var(--danger);
        }

        button.btn-danger:hover {
            background-color: var(--danger-hover);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--bg);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }
        
        .actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .actions button {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        #edit-section {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Product Catalog</h1>

    <div class="card" id="add-section">
        <h2>Add New Product</h2>
        <form id="product-form">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category">
            </div>
            <div class="form-group">
                <label for="stock">Stock Quantity</label>
                <input type="number" id="stock" value="0">
            </div>
            <button type="submit">Add Product</button>
        </form>
    </div>

    <div class="card" id="edit-section">
        <h2>Edit Product</h2>
        <form id="edit-form">
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label for="edit-name">Product Name</label>
                <input type="text" id="edit-name" required>
            </div>
            <div class="form-group">
                <label for="edit-description">Description</label>
                <textarea id="edit-description" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label for="edit-price">Price ($)</label>
                <input type="number" id="edit-price" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="edit-category">Category</label>
                <input type="text" id="edit-category">
            </div>
            <div class="form-group">
                <label for="edit-stock">Stock Quantity</label>
                <input type="number" id="edit-stock">
            </div>
            <button type="submit">Update Product</button>
            <button type="button" class="btn-danger" onclick="cancelEdit()">Cancel</button>
        </form>
    </div>

    <div class="card">
        <h2>Products List</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="product-list">
                <!-- Products will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = '/api/products';

    // Fetch and display products
    async function fetchProducts() {
        try {
            const response = await fetch(API_URL);
            const products = await response.json();
            const tbody = document.getElementById('product-list');
            tbody.innerHTML = '';

            products.forEach(product => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${product.name}</strong><br><small style="color:var(--text-muted)">${product.description || ''}</small></td>
                    <td>${product.category || 'N/A'}</td>
                    <td>$${product.price.toFixed(2)}</td>
                    <td>${product.stock}</td>
                    <td class="actions">
                        <button onclick="editProduct('${product._id}')">Edit</button>
                        <button class="btn-danger" onclick="deleteProduct('${product._id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error('Error fetching products:', error);
        }
    }

    // Add new product
    document.getElementById('product-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newProduct = {
            name: document.getElementById('name').value,
            description: document.getElementById('description').value,
            price: parseFloat(document.getElementById('price').value),
            category: document.getElementById('category').value,
            stock: parseInt(document.getElementById('stock').value) || 0
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newProduct)
            });
            document.getElementById('product-form').reset();
            fetchProducts();
        } catch (error) {
            console.error('Error adding product:', error);
        }
    });

    // Delete product
    async function deleteProduct(id) {
        if (!confirm('Are you sure you want to delete this product?')) return;
        
        try {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchProducts();
        } catch (error) {
            console.error('Error deleting product:', error);
        }
    }

    // Load product data into edit form
    async function editProduct(id) {
        try {
            const response = await fetch(`${API_URL}/${id}`);
            const product = await response.json();
            
            document.getElementById('edit-id').value = product._id;
            document.getElementById('edit-name').value = product.name;
            document.getElementById('edit-description').value = product.description || '';
            document.getElementById('edit-price').value = product.price;
            document.getElementById('edit-category').value = product.category || '';
            document.getElementById('edit-stock').value = product.stock;

            document.getElementById('add-section').style.display = 'none';
            document.getElementById('edit-section').style.display = 'block';
            window.scrollTo(0, 0);
        } catch (error) {
            console.error('Error fetching product details:', error);
        }
    }

    // Update product
    document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const id = document.getElementById('edit-id').value;
        const updatedProduct = {
            name: document.getElementById('edit-name').value,
            description: document.getElementById('edit-description').value,
            price: parseFloat(document.getElementById('edit-price').value),
            category: document.getElementById('edit-category').value,
            stock: parseInt(document.getElementById('edit-stock').value)
        };

        try {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedProduct)
            });
            cancelEdit();
            fetchProducts();
        } catch (error) {
            console.error('Error updating product:', error);
        }
    });

    // Cancel edit
    function cancelEdit() {
        document.getElementById('edit-form').reset();
        document.getElementById('edit-section').style.display = 'none';
        document.getElementById('add-section').style.display = 'block';
    }

    // Initial load
    fetchProducts();
</script>

</body>
</html>
