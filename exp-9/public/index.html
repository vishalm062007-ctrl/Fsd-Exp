<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg: #f0f9ff;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            flex: 1;
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.btn-danger {
            background-color: var(--danger);
        }

        button.btn-danger:hover {
            background-color: var(--danger-hover);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }
        
        .actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .actions button {
            padding: 0.4rem 0.8rem;
            font-size: 0.875rem;
        }

        #edit-section {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Employee Management System</h1>

    <div class="card" id="add-section">
        <h2>Add New Employee</h2>
        <form id="employee-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" placeholder="Engineering">
                </div>
                <div class="form-group">
                    <label for="salary">Salary ($)</label>
                    <input type="number" id="salary" step="0.01" required placeholder="65000">
                </div>
            </div>
            <button type="submit">Add Employee</button>
        </form>
    </div>

    <div class="card" id="edit-section">
        <h2>Edit Employee</h2>
        <form id="edit-form">
            <input type="hidden" id="edit-id">
            <div class="form-row">
                <div class="form-group">
                    <label for="edit-name">Full Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-email">Email Address</label>
                    <input type="email" id="edit-email" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="edit-department">Department</label>
                    <input type="text" id="edit-department">
                </div>
                <div class="form-group">
                    <label for="edit-salary">Salary ($)</label>
                    <input type="number" id="edit-salary" step="0.01" required>
                </div>
            </div>
            <button type="submit">Update Employee</button>
            <button type="button" class="btn-danger" onclick="cancelEdit()">Cancel</button>
        </form>
    </div>

    <div class="card">
        <h2>Employees Directory</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name & Email</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="employee-list">
                <!-- Employees will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = '/api/employees';

    // Fetch and display employees
    async function fetchEmployees() {
        try {
            const response = await fetch(API_URL);
            const employees = await response.json();
            const tbody = document.getElementById('employee-list');
            tbody.innerHTML = '';

            employees.forEach(emp => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${emp.id}</td>
                    <td><strong>${emp.name}</strong><br><small style="color:var(--text-muted)">${emp.email}</small></td>
                    <td><span style="background:#e0f2fe;color:#0369a1;padding:0.25rem 0.5rem;border-radius:4px;font-size:0.875rem;">${emp.department || 'N/A'}</span></td>
                    <td>$${Number(emp.salary).toLocaleString()}</td>
                    <td class="actions">
                        <button onclick="editEmployee('${emp.id}')">Edit</button>
                        <button class="btn-danger" onclick="deleteEmployee('${emp.id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error('Error fetching employees:', error);
        }
    }

    // Add new employee
    document.getElementById('employee-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newEmployee = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            department: document.getElementById('department').value,
            salary: parseFloat(document.getElementById('salary').value)
        };

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newEmployee)
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.error);

            document.getElementById('employee-form').reset();
            fetchEmployees();
        } catch (error) {
            alert('Error adding employee: ' + error.message);
            console.error(error);
        }
    });

    // Delete employee
    async function deleteEmployee(id) {
        if (!confirm('Are you sure you want to delete this employee?')) return;
        
        try {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchEmployees();
        } catch (error) {
            console.error('Error deleting employee:', error);
        }
    }

    // Load employee data into edit form
    async function editEmployee(id) {
        try {
            const response = await fetch(`${API_URL}/${id}`);
            const emp = await response.json();
            
            document.getElementById('edit-id').value = emp.id;
            document.getElementById('edit-name').value = emp.name;
            document.getElementById('edit-email').value = emp.email;
            document.getElementById('edit-department').value = emp.department || '';
            document.getElementById('edit-salary').value = emp.salary;

            document.getElementById('add-section').style.display = 'none';
            document.getElementById('edit-section').style.display = 'block';
            window.scrollTo(0, 0);
        } catch (error) {
            console.error('Error fetching employee details:', error);
        }
    }

    // Update employee
    document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const id = document.getElementById('edit-id').value;
        const updatedEmployee = {
            name: document.getElementById('edit-name').value,
            email: document.getElementById('edit-email').value,
            department: document.getElementById('edit-department').value,
            salary: parseFloat(document.getElementById('edit-salary').value)
        };

        try {
            const res = await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedEmployee)
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.error);

            cancelEdit();
            fetchEmployees();
        } catch (error) {
            alert('Error updating employee: ' + error.message);
            console.error(error);
        }
    });

    // Cancel edit
    function cancelEdit() {
        document.getElementById('edit-form').reset();
        document.getElementById('edit-section').style.display = 'none';
        document.getElementById('add-section').style.display = 'block';
    }

    // Initial load
    fetchEmployees();
</script>

</body>
</html>
